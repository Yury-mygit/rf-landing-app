name: landing_dev

services:
  app:
    build: .
    container_name: landing_dev_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8024:8000"
    environment:
      - SERVICE_NAME=${SERVICE_NAME}
      - DOCS_API_URL=${DOCS_API_URL}
      - AUTH_API_URL=${AUTH_API_URL}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/info"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - shared

networks:
  shared:
    external: true
